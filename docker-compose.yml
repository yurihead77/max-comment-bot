# Local / server PostgreSQL for max-comment-bot.
# API and other services usually run outside this compose file; use DATABASE_URL accordingly.
#
# Named volume `comments_pgdata` survives container restarts. If PGDATA is non-empty,
# POSTGRES_DB is NOT re-applied — create the DB manually or remove the volume for a fresh init.
# POSTGRES_PASSWORD here only applies on first init of an empty volume; it does NOT resync the
# postgres role password if the volume already exists — mismatched app DATABASE_URL then causes
# Prisma P1000. Prefer a dedicated app user in DATABASE_URL (see DEPLOYMENT.md: `commentbot`).

services:
  comments-db:
    image: postgres:15
    container_name: comments-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: commentbot
      POSTGRES_PASSWORD: Sa6Ds1378
      POSTGRES_DB: comments
    ports:
      - "5432:5432"
    volumes:
      - comments_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d comments"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  comments_pgdata:
